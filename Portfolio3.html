<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="../CSS/Portfolio3.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex" id="wrapper">
        <div class="sidebar py-4 d-flex flex-column">
            <a href="#" class="nav-item text-white mb-4 text-decoration-none">
                <i class="bi bi-house-door-fill fs-5"></i>
                <span class="menu-text">Home</span>
            </a>
            <a href="#" class="nav-item text-white mb-4 text-decoration-none opacity-75">
                <i class="bi bi-headset fs-5"></i>
                <span class="menu-text">Services</span>
            </a>
            <a href="#" class="nav-item text-white mb-4 text-decoration-none opacity-75">
                <i class="bi bi-flag-fill fs-5"></i>
                <span class="menu-text">Alerts</span>
            </a>
            <a href="#" class="nav-item text-white mb-4 text-decoration-none opacity-75">
                <i class="bi bi-pie-chart-fill fs-5"></i>
                <span class="menu-text">Stats</span>
            </a>
        </div>

        <div class="page-content-wrapper bg-light">
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 px-4 shadow-sm mb-4">
                <div class="container-fluid px-0">
                    <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse"
                        data-bs-target="#topNavBar" aria-controls="topNavBar" aria-expanded="false"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="topNavBar">

                        <form class="d-flex search-form mt-3 mt-lg-0 me-auto">
                            <input class="form-control rounded-0 rounded-start search-input" type="search"
                                placeholder="Search" aria-label="Search">
                            <button class="btn btn-dark rounded-0 rounded-end" type="submit"><i
                                    class="bi bi-search"></i></button>
                        </form>

                        <div class="d-flex align-items-center gap-4 gap-lg-3 mt-4 mt-lg-0 mb-2 mb-lg-0">
                            <div class="position-relative">
                                <i class="bi bi-bell-fill text-muted fs-5"></i>
                                <span
                                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                                    style="font-size: 0.6rem;">5</span>
                            </div>
                            <div class="position-relative">
                                <i class="bi bi-envelope-fill text-muted fs-5"></i>
                                <span
                                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                                    style="font-size: 0.6rem;">9</span>
                            </div>
                            <span class="ms-1 text-muted">Minny Park</span>
                        </div>

                    </div>
                </div>
            </nav>

            <div class="container-fluid px-4">
                <h3 class="mb-4 fw-bold text-dark">Dashboard</h3>

                <div class="row g-4 mb-4">
                    <div class="col-xl-3 col-md-6">
                        <div class="card border-0 shadow-sm h-100 py-2 custom-border-left-info">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted small mb-1">Earnings (Monthly)</div>
                                    <div class="h4 mb-0 fw-bold">$400,000</div>
                                </div>
                                <i class="bi bi-calendar-event-fill fs-1 text-muted opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6">
                        <div class="card border-0 shadow-sm h-100 py-2 custom-border-left-success">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted small mb-1">Earnings (Annual)</div>
                                    <div class="h4 mb-0 fw-bold">$800,000</div>
                                </div>
                                <i class="bi bi-currency-dollar fs-1 text-muted opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6">
                        <div class="card border-0 shadow-sm h-100 py-2 custom-border-left-primary">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted small mb-1">Tasks</div>
                                    <div class="h4 mb-0 fw-bold">13</div>
                                </div>
                                <i class="bi bi-list-task fs-1 text-muted opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6">
                        <div class="card border-0 shadow-sm h-100 py-2 custom-border-left-warning">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted small mb-1">Requests</div>
                                    <div class="h4 mb-0 fw-bold">26</div>
                                </div>
                                <i class="bi bi-chat-left-fill fs-1 text-muted opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-xl-8">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 fw-bold">
                                Earnings Overview
                            </div>
                            <div class="card-body">
                                <canvas id="myAreaChart" style="height: 300px; width: 100%;"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-4">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 fw-bold">
                                Tasks
                            </div>
                            <div class="card-body">
                                <ul class="list-group list-group-flush mt-2">
                                    <li
                                        class="list-group-item d-flex justify-content-between align-items-center py-3 border-bottom">
                                        Borrowed Items
                                        <span class="badge bg-primary rounded-pill">14</span>
                                    </li>
                                    <li
                                        class="list-group-item d-flex justify-content-between align-items-center py-3 border-bottom">
                                        Trello requests
                                        <span class="badge bg-primary rounded-pill">2</span>
                                    </li>
                                    <li
                                        class="list-group-item d-flex justify-content-between align-items-center py-3 border-bottom">
                                        Marked Comments
                                        <span class="badge bg-primary rounded-pill">1</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../JS/dashboardChart.js"></script>
</body>

</html>
